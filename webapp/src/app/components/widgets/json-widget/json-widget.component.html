<div fxLayout="row" class="property-container" [matTooltip]="attribute?.description!">
	@if (!noPropName) {
		<label class="property-name">{{ key }}:</label>
	}
	<textarea
		class="default-input"
		[ngModel]="getJsonVal()"
		(input)="setCustomSetting(key, $any($event.target).value)"
		[rows]="rows()"
	>
	</textarea>
	<button class="mini-button" (click)="openJsonEditor()">+</button>
</div>
